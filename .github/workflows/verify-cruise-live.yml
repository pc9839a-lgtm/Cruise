name: Verify cruise live URLs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  verify:
    if: github.event.pull_request.title == 'Verify cruise live URLs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          show-progress: false

      - name: Check deployed URLs
        shell: bash
        run: |
          set -euo pipefail
          : > live-status.txt
          urls=(
            "https://cruiseplay-dyt.pages.dev/blog/cruise-laundry-self-service-cost-guide/"
            "https://cruiseplay-dyt.pages.dev/blog/cruise-prohibited-items-power-strip-guide/"
            "https://cruiseplay-dyt.pages.dev/blog/cruise-packing-by-season/"
            "https://cruiseplay-dyt.pages.dev/blog/extra-cruise-costs/"
          )
          for url in "${urls[@]}"; do
            ok=0
            for attempt in $(seq 1 12); do
              code=$(curl -L -sS -o /tmp/page.html -w "%{http_code}" --connect-timeout 15 --max-time 30 "$url" || true)
              if [ "$code" = "200" ]; then
                echo "200 $url" | tee -a live-status.txt
                ok=1
                break
              fi
              echo "attempt=$attempt status=$code url=$url" | tee -a live-status.txt
              sleep 10
            done
            if [ "$ok" != "1" ]; then
              echo "FAILED $url" | tee -a live-status.txt
              exit 1
            fi
          done

          curl -L -sS "${urls[0]}" -o /tmp/new-page.html
          grep -Fq "Ēü¼ļŻ©ņ”łņŚÉņä£ ļ╣©ļ×śļŖö ņ¢┤ļ¢╗Ļ▓ī ĒĢĀĻ╣ī?" /tmp/new-page.html
          curl -L -sS "https://cruiseplay-dyt.pages.dev/blog/" -o /tmp/blog-index.html
          grep -Fq "/blog/cruise-laundry-self-service-cost-guide/" /tmp/blog-index.html
          curl -L -sS "https://cruiseplay-dyt.pages.dev/sitemap.xml" -o /tmp/sitemap.xml
          test "$(grep -Fo "https://cruiseplay-dyt.pages.dev/blog/cruise-laundry-self-service-cost-guide/" /tmp/sitemap.xml | wc -l)" = "1"
          curl -L -sS "https://cruiseplay-dyt.pages.dev/rss.xml" -o /tmp/rss.xml
          grep -Fq "https://cruiseplay-dyt.pages.dev/blog/cruise-laundry-self-service-cost-guide/" /tmp/rss.xml
          echo "content_title=ok" | tee -a live-status.txt
          echo "blog_static_link=ok" | tee -a live-status.txt
          echo "sitemap_url_count=1" | tee -a live-status.txt
          echo "rss_new_item=ok" | tee -a live-status.txt

      - name: Upload live verification
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cruise-live-status-${{ github.run_number }}
          path: live-status.txt
          retention-days: 1

      - name: Remove one-time verifier
        if: success()
        shell: bash
        run: |
          rm -f .github/workflows/verify-cruise-live.yml
          git config user.name "cruiseplay-content-bot"
          git config user.email "actions@users.noreply.github.com"
          git add .github/workflows/verify-cruise-live.yml
          git commit -m "Remove one-time live URL verifier"
          git push origin HEAD:main
