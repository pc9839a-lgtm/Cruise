name: Replace duplicate cruise guide

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  replace:
    if: github.event.pull_request.title == 'Replace duplicate cruise guide'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          show-progress: false

      - name: Replace duplicate article and validate repository
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from difflib import SequenceMatcher
          import html
          import json
          import re

          TODAY = "2026-07-21"
          DISPLAY_DATE = "2026.07.21"
          RSS_DATE = "Tue, 21 Jul 2026 08:00:00 +0000"
          BASE = "https://cruiseplay-dyt.pages.dev"
          OLD_SLUG = "cruise-laundry-self-service-cost-guide"
          NEW_SLUG = "cruise-duty-free-customs-declaration-korea-guide"
          CATEGORY = "여행팁"
          TITLE = "크루즈 면세품은 한국 입국 때 어떻게 신고할까? 면세한도·주류·세관신고 가이드"
          SUMMARY = "크루즈 선내 면세점과 기항지에서 산 물품을 한국으로 가져올 때 일반물품 800달러, 주류·담배·향수 별도 면세범위, 항만 세관 신고 순서와 영수증 준비 방법을 정리했습니다."
          TAGS = "크루즈면세점,세관신고,여행자면세한도,한국입국"
          URL = f"{BASE}/blog/{NEW_SLUG}/"
          OLD_URL = f"{BASE}/blog/{OLD_SLUG}/"
          AUTHOR = "크루즈플레이 편집팀"

          root = Path.cwd()
          meta_path = root / "content/blog-meta.json"
          index_path = root / "blog/index.html"
          sitemap_path = root / "sitemap.xml"
          rss_path = root / "rss.xml"
          feed_path = root / "feed.xml"
          js_path = root / "assets/js/blog-index.js"
          robots_path = root / "robots.txt"
          sitemap_google_path = root / "sitemap-google.xml"
          partner_path = root / "partner/index.html"
          old_page = root / "blog" / OLD_SLUG / "index.html"
          new_page = root / "blog" / NEW_SLUG / "index.html"

          required = [meta_path, index_path, sitemap_path, rss_path, feed_path, js_path,
                      robots_path, sitemap_google_path, partner_path, old_page]
          missing = [str(p.relative_to(root)) for p in required if not p.exists()]
          if missing:
              raise SystemExit("필수 파일 누락: " + ", ".join(missing))
          if new_page.exists():
              raise SystemExit("교체할 신규 slug가 이미 존재함")

          meta = json.loads(meta_path.read_text(encoding="utf-8"))
          posts = meta.get("posts", [])
          if not isinstance(posts, list) or len(posts) != 57:
              raise SystemExit(f"교체 전 메타 글 수 오류: {len(posts) if isinstance(posts, list) else 'invalid'}")
          old_matches = [p for p in posts if p.get("slug") == OLD_SLUG]
          if len(old_matches) != 1:
              raise SystemExit(f"교체 대상 글 개수 오류: {len(old_matches)}")
          old_post = old_matches[0]
          todays = [p for p in posts if p.get("published_at") == TODAY]
          if len(todays) != 1 or todays[0].get("slug") != OLD_SLUG:
              raise SystemExit("당일 글 1편 규칙 또는 교체 대상 불일치")
          if any(p.get("slug") == NEW_SLUG for p in posts):
              raise SystemExit("신규 slug 중복")
          if any(p.get("title") == TITLE for p in posts):
              raise SystemExit("신규 제목 중복")

          def normalize(value):
              return re.sub(r"[^0-9a-z가-힣]+", "", str(value).lower())

          stopwords = {"크루즈", "가이드", "어떻게", "할까", "확인", "준비", "여행", "한국", "입국"}
          def token_set(value):
              words = re.findall(r"[0-9a-z가-힣]{2,}", str(value).lower())
              return {w for w in words if w not in stopwords}

          candidate_text = TITLE + " " + SUMMARY + " " + TAGS
          candidate_norm = normalize(candidate_text)
          candidate_tokens = token_set(candidate_text)
          comparisons = []
          for post in posts:
              if post.get("slug") == OLD_SLUG:
                  continue
              existing_text = " ".join(str(post.get(k, "")) for k in ("title", "summary", "tag_text"))
              ratio = SequenceMatcher(None, candidate_norm, normalize(existing_text)).ratio()
              existing_tokens = token_set(existing_text)
              union = candidate_tokens | existing_tokens
              jaccard = len(candidate_tokens & existing_tokens) / len(union) if union else 0
              comparisons.append((max(ratio, jaccard), ratio, jaccard, post.get("slug", ""), post.get("title", "")))
          comparisons.sort(reverse=True)
          best = comparisons[0]
          if best[0] >= 0.70:
              raise SystemExit(f"의미상 중복 기준 초과: {best[3]} score={best[0]:.3f}")
          existing_without_old = " ".join(
              " ".join(str(p.get(k, "")) for k in ("title", "summary", "tag_text"))
              for p in posts if p.get("slug") != OLD_SLUG
          )
          if re.search(r"면세|세관|관세|휴대품신고", existing_without_old):
              raise SystemExit("기존 메타에서 세관·면세 핵심 검색의도 발견")

          page_titles = []
          for page in sorted((root / "blog").glob("*/index.html")):
              if page == old_page:
                  continue
              text = page.read_text(encoding="utf-8", errors="replace")
              match = re.search(r"<h1[^>]*>(.*?)</h1>", text, re.S | re.I)
              if match:
                  old_title = re.sub(r"<[^>]+>", "", match.group(1)).strip()
                  ratio = SequenceMatcher(None, normalize(TITLE), normalize(old_title)).ratio()
                  if ratio >= 0.70:
                      raise SystemExit(f"기존 상세페이지 제목과 중복: {old_title} ({ratio:.3f})")
                  page_titles.append(old_title)

          used_images = {p.get("thumbnail_url", "") for p in posts if p.get("slug") != OLD_SLUG}
          image_candidates = [
              "https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?q=80&w=1600&auto=format&fit=crop",
              "https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1600&auto=format&fit=crop",
              "https://images.unsplash.com/photo-1521334884684-d80222895322?q=80&w=1600&auto=format&fit=crop",
          ]
          IMAGE = next((u for u in image_candidates if u not in used_images), None)
          if not IMAGE:
              raise SystemExit("고유한 면세 쇼핑 이미지 URL을 선택하지 못함")

          related = [
              ("cruise-onboard-payment-guide", "크루즈 선상 결제와 최종 명세서"),
              ("cruise-luggage-guide", "크루즈 수하물과 하선 전 짐 정리"),
              ("cruise-passport-documents-check", "출발 전 여권과 입국 서류"),
          ]
          for rel_slug, _ in related:
              if not (root / "blog" / rel_slug / "index.html").exists():
                  raise SystemExit("관련 내부링크 대상 누락: " + rel_slug)

          title_html = html.escape(TITLE)
          summary_html = html.escape(SUMMARY)
          image_html = html.escape(IMAGE, quote=True)
          json_ld = json.dumps({
              "@context": "https://schema.org",
              "@type": "BlogPosting",
              "headline": TITLE,
              "description": SUMMARY,
              "image": IMAGE,
              "datePublished": TODAY,
              "dateModified": TODAY,
              "inLanguage": "ko-KR",
              "mainEntityOfPage": URL,
              "author": {"@type": "Organization", "name": AUTHOR},
              "publisher": {"@type": "Organization", "name": "크루즈플레이", "url": BASE + "/"},
          }, ensure_ascii=False, separators=(",", ":")).replace("</", "<\\/")

          page_html = f'''<!DOCTYPE html><html lang="ko" class="blog-page blog-post-page"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>{title_html} | 크루즈플레이</title><meta name="description" content="{summary_html}" /><meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" /><meta name="author" content="크루즈플레이 편집팀" /><link rel="canonical" href="{URL}" /><meta property="og:locale" content="ko_KR" /><meta property="og:type" content="article" /><meta property="og:site_name" content="크루즈플레이" /><meta property="og:title" content="{title_html} | 크루즈플레이" /><meta property="og:description" content="{summary_html}" /><meta property="og:url" content="{URL}" /><meta property="og:image" content="{image_html}" /><meta property="article:published_time" content="{TODAY}" /><meta property="article:modified_time" content="{TODAY}" /><link rel="preconnect" href="https://cdn.jsdelivr.net" /><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" /><link rel="stylesheet" href="/assets/css/styles.css" /><link rel="stylesheet" href="/assets/css/blog.css" /><style>.post-wrap{{max-width:980px;margin:0 auto;padding:44px 20px 90px}}.post-card{{background:#fff;border:1px solid #e5e7eb;border-radius:28px;box-shadow:0 20px 70px rgba(15,23,42,.08);overflow:hidden}}.post-head{{padding:42px 42px 24px}}.post-chip{{display:inline-flex;align-items:center;padding:7px 13px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:13px;font-weight:800}}.post-title{{margin:18px 0 14px;font-size:42px;line-height:1.18;letter-spacing:-.04em;color:#0f172a}}.post-summary{{font-size:18px;line-height:1.75;color:#475569}}.post-meta{{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;color:#64748b;font-size:14px}}.post-cover{{height:360px;background:#e5e7eb;overflow:hidden}}.post-cover img{{width:100%;height:100%;object-fit:cover;display:block}}.post-body{{padding:42px;line-height:1.9;color:#1f2937;font-size:17px}}.post-body h2{{margin:46px 0 16px;font-size:28px;line-height:1.35;letter-spacing:-.03em;color:#111827}}.post-body h3{{margin:28px 0 10px;font-size:21px;color:#111827}}.post-body p{{margin:0 0 18px}}.post-body ul,.post-body ol{{margin:10px 0 24px;padding-left:22px}}.post-body li{{margin:8px 0}}.post-body blockquote{{margin:24px 0;padding:20px 22px;border-left:4px solid #2563eb;background:#f8fafc;border-radius:16px;color:#334155;font-weight:700}}.post-toc,.post-note,.post-sources{{border:1px solid #dbeafe;background:#f8fbff;border-radius:22px;padding:22px;margin:28px 0}}.post-toc a,.post-sources a{{color:#1e3a8a;text-decoration:none;word-break:break-all}}.post-note{{border-color:#fde68a;background:#fffbeb}}.post-table{{width:100%;border-collapse:separate;border-spacing:0;margin:22px 0;border:1px solid #e5e7eb;border-radius:18px;overflow:hidden}}.post-table th,.post-table td{{padding:15px 16px;border-bottom:1px solid #e5e7eb;vertical-align:top}}.post-table th{{background:#f8fafc;color:#0f172a;text-align:left}}.post-table tr:last-child td{{border-bottom:0}}.post-check{{margin:24px 0;padding:22px;border:1px solid #cbd5e1;border-radius:20px;background:#fff}}.post-cta{{margin-top:46px;padding:26px;border-radius:24px;background:#0f172a;color:#fff}}.post-cta h2{{color:#fff;margin-top:0}}.post-cta p{{color:#dbeafe}}.post-cta a{{display:inline-flex;margin-top:10px;background:#fff;color:#0f172a;border-radius:999px;padding:12px 18px;font-weight:800;text-decoration:none}}.post-tags{{display:flex;gap:8px;flex-wrap:wrap;margin-top:30px}}.post-tags span{{background:#f1f5f9;color:#334155;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:700}}.post-related{{margin-top:38px}}.post-related h2{{margin-top:0}}.post-related-grid{{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}}.post-related-grid a{{border:1px solid #e5e7eb;border-radius:18px;padding:16px;text-decoration:none;color:#0f172a;background:#fff}}.post-related-grid strong{{display:block;line-height:1.5}}.post-related-grid span{{display:block;margin-top:8px;color:#64748b;font-size:13px}}.site-policy-links{{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:24px;font-size:14px}}.site-policy-links a{{color:#475569;text-decoration:none}}@media(max-width:768px){{.post-wrap{{padding:24px 14px 70px}}.post-head,.post-body{{padding:28px 20px}}.post-title{{font-size:31px}}.post-cover{{height:230px}}.post-table{{font-size:14px;display:block;overflow-x:auto}}.post-related-grid{{grid-template-columns:1fr}}}}</style><script type="application/ld+json">{json_ld}</script></head><body class="blog-page blog-post-page"><div class="blog-shell"><header class="blog-topbar"><div class="blog-topbar-inner"><a class="blog-brand" href="/"><span class="blog-brand-dot"></span><strong>크루즈플레이</strong></a><nav class="blog-nav"><a href="/">홈</a><a href="/#schedule">추천 일정</a><a href="/blog/" class="is-current">콘텐츠</a><a href="/#reviews">여행 후기</a><a href="/#contact" class="blog-nav-cta">문의하기</a></nav></div></header><main class="post-wrap"><article class="post-card"><header class="post-head"><span class="post-chip">{CATEGORY}</span><h1 class="post-title">{title_html}</h1><p class="post-summary">{summary_html}</p><div class="post-meta"><span>작성자 {AUTHOR}</span><span>게시일 {DISPLAY_DATE}</span><span>수정일 {DISPLAY_DATE}</span><span>읽는 시간 약 10분</span></div></header><div class="post-cover"><img src="{image_html}" alt="크루즈 여행 후 면세품 영수증과 쇼핑백을 수하물 옆에 두고 한국 입국 세관 신고 항목을 확인하는 모습" width="1600" height="900" /></div><div class="post-body"><div class="post-toc"><strong>이 글에서 확인할 내용</strong><ol><li><a href="#scope">어떤 구매품이 한국 면세한도에 포함되는지</a></li><li><a href="#allowance">일반물품과 주류·담배·향수 면세범위</a></li><li><a href="#places">선내 면세점·기항지·국내 면세점 차이</a></li><li><a href="#examples">실제 금액을 합산하는 방법</a></li><li><a href="#family">가족 여행 때 1인당 한도 적용</a></li><li><a href="#process">항만 입국 세관 신고 동선</a></li><li><a href="#prepare">영수증·앱·결제내역 준비</a></li><li><a href="#checklist">하선 전 체크리스트</a></li></ol></div><p>크루즈 선내 면세점이나 해외 기항지에서 산 물건은 배 안에서 면세로 결제했더라도 한국 입국 때 여행자 면세범위를 다시 적용받습니다. <strong>면세점에서 샀다는 사실과 한국 세관 신고 의무는 별개</strong>입니다. 국내·외 면세점 구매품, 해외 매장 구매품, 선물로 받은 물품까지 한국으로 들여오는 해외 취득 물품의 가격을 합산해 판단합니다.</p><p>한국에서 출발한 크루즈도 해외 기항지를 다녀온 뒤 돌아오면 항만 입국 절차를 거칩니다. 하선 직전에 영수증을 찾느라 시간을 쓰지 않으려면 선내 구매내역, 카드 승인내역, 기항지 영수증을 미리 한곳에 모아야 합니다. 아래 기준은 2026년 7월 21일 관세청 공식 자료를 확인해 정리했으며, 개별 물품의 최종 과세 여부와 가격 인정은 입국 세관의 판단이 기준입니다.</p><blockquote>가장 안전한 기준은 “면세점에서 샀는가”가 아니라 “한국으로 가져오는 해외 취득 물품의 총가격이 얼마인가”입니다.</blockquote><h2 id="scope">1. 무엇을 합산해야 할까</h2><p>여행자가 해외에서 구입하거나 선물로 받은 물품, 국내 출국장·시내·입국장 면세점에서 산 뒤 국내로 다시 반입하는 물품은 여행자 휴대품 면세범위 계산 대상입니다. 크루즈 선내 면세점에서 산 화장품, 시계, 가방과 기항지 상점에서 산 의류·전자제품도 일반물품 총액에 포함합니다.</p><ul><li>선내 면세점 구매품</li><li>해외 기항지 백화점·아웃렛·기념품점 구매품</li><li>국내 출국장 또는 시내 면세점에서 산 후 재반입하는 물품</li><li>현지 지인에게 선물로 받은 물품</li><li>개인 사용을 위해 산 새 물품</li></ul><p>반대로 출국 전부터 사용하던 개인 의류나 휴대전화처럼 명확한 신변용품은 일반적인 여행자 휴대품으로 판단될 수 있습니다. 다만 새 고가품, 판매 목적의 수량, 회사 업무용 물품은 개인 면세범위와 다르게 취급될 수 있으므로 세관에 신고하고 확인하는 편이 안전합니다.</p><h2 id="allowance">2. 1인당 면세범위는 이렇게 나뉩니다</h2><table class="post-table"><thead><tr><th>구분</th><th>1인당 면세범위</th><th>확인할 점</th></tr></thead><tbody><tr><td>일반물품</td><td>해외 취득가격 합계 미화 800달러 이하</td><td>국내·외 면세점, 선내 면세점, 기항지 구매와 선물을 합산</td></tr><tr><td>주류</td><td>전체 용량 2L 이하이면서 총가격 미화 400달러 이하</td><td>두 조건을 모두 충족해야 별도 면세범위 적용</td></tr><tr><td>궐련</td><td>200개비</td><td>전자담배 등 다른 담배 유형은 별도 수량 기준을 확인</td></tr><tr><td>향수</td><td>100mL</td><td>일반 화장품과 향수를 구분해 준비</td></tr><tr><td>만 19세 미만</td><td>주류·담배 면세 제외</td><td>가족 여행이어도 미성년자 몫으로 술·담배를 나눌 수 없음</td></tr></tbody></table><div class="post-note"><strong>주류는 일반물품 800달러와 별도인가요?</strong><p>공식 기준을 충족하는 주류는 일반물품 800달러와 별도의 면세범위가 적용됩니다. 다만 전체 용량과 총가격 조건 중 하나라도 넘거나, 여러 명의 물품 소유관계가 불분명하면 신고하고 세관의 판단을 받아야 합니다.</p></div><h2 id="places">3. 선내 면세점과 기항지 구매품은 신고 기준이 같습니다</h2><table class="post-table"><thead><tr><th>구매 장소</th><th>한국 입국 때 처리</th></tr></thead><tbody><tr><td>크루즈 선내 면세점</td><td>선내 결제 내역을 포함해 한국 면세한도 계산</td></tr><tr><td>해외 기항지 일반 매장</td><td>현지 영수증의 실제 구매금액을 포함</td></tr><tr><td>해외 공항·항만 면세점</td><td>면세 구매라도 한국 반입 한도에 포함</td></tr><tr><td>국내 출국장·시내 면세점</td><td>출국 때 샀다가 국내로 가져오면 포함</td></tr><tr><td>선물로 받은 물품</td><td>무상 취득이어도 가격을 확인해 포함</td></tr></tbody></table><p>선내 결제금액은 승선카드 또는 선내 계정에 누적되는 경우가 많습니다. 하선 전 최종 명세서를 확인하는 방법은 <a href="/blog/cruise-onboard-payment-guide/">크루즈 선상 결제 가이드</a>에서 확인할 수 있습니다.</p><h2 id="examples">4. 실제로 합산해 보면</h2><h3>일반물품이 800달러를 조금 넘는 경우</h3><p>한 사람이 기항지에서 가방 650달러, 선내 면세점에서 화장품 220달러를 샀다면 일반물품 합계는 870달러입니다. 구매 장소가 달라도 합산하므로 면세범위를 넘는 물품이 있다고 신고해야 합니다. 실제 납부세액은 물품 종류, 과세가격, 적용 세율과 세관 판단에 따라 달라지므로 임의로 계산해 숨기지 말고 신고 후 안내를 받는 편이 정확합니다.</p><h3>주류와 일반물품을 함께 산 경우</h3><p>주류가 전체 2L 이하이고 총가격 400달러 이하라면 별도 면세범위를 검토할 수 있습니다. 가방·화장품 등 일반물품은 따로 800달러 기준으로 합산합니다. 주류의 용량이나 가격 중 하나가 범위를 넘으면 신고 대상 여부를 확인해야 합니다.</p><h3>환율이 헷갈리는 경우</h3><p>현지 통화 영수증, 카드 앱의 원화 환산액, 선내 달러 명세서를 모두 보관하세요. 세관은 입국 시 적용되는 기준과 자료를 바탕으로 가격을 판단할 수 있으므로 여행자가 임의 환율로 800달러 아래라고 단정하지 않는 것이 좋습니다.</p><h2 id="family">5. 가족은 한도를 합쳐 쓸 수 있을까</h2><p>면세범위는 원칙적으로 여행자 1인당 적용됩니다. 부부가 함께 입국한다고 해서 한 사람이 산 고가품을 자동으로 둘의 800달러 한도로 쪼개 계산할 수 있다고 단정하면 안 됩니다. 실제 소유자, 사용자, 결제와 영수증, 물품의 수량과 성격을 세관이 확인할 수 있습니다.</p><ul><li>각자 산 물품과 영수증을 사람별로 구분합니다.</li><li>가족 공용 선물도 실제 구매자와 반입자를 사실대로 설명합니다.</li><li>미성년자에게 주류·담배 한도를 배정하지 않습니다.</li><li>고가품 한 개를 임의로 여러 사람에게 분할 신고하지 않습니다.</li><li>판매·사업 목적 물품은 여행자 개인용 면세로 처리된다고 가정하지 않습니다.</li></ul><h2 id="process">6. 항만 입국 세관 신고 동선</h2><p>여객선으로 입국할 때 일반적인 순서는 <strong>선박 도착 → 출입국 입국심사 → 수하물 수취 → 여행자 휴대품 신고·세관 신고 → 필요 시 세관 검사</strong>입니다. 신고할 물품이 없다면 신고서 제출을 생략하고 신고 없음 통로로 이동할 수 있지만, 검사 대상이 될 수 있습니다.</p><p>신고할 물품이 있으면 항만 안내에 따라 종이 신고서 또는 여행자 세관신고 모바일 서비스를 이용합니다. 모바일 신고·납부 가능 범위와 QR 리더기 위치는 항만별 운영이 달라질 수 있으므로 도착 터미널의 현장 안내와 관세청 앱을 확인하세요.</p><p>자진신고하면 관세의 30%, 최대 20만원까지 감면될 수 있습니다. 신고하지 않았다가 적발되면 납부세액의 40% 가산세가 부과될 수 있고, 2년 이내 반복 불이행은 60%가 적용될 수 있습니다.</p><h2 id="prepare">7. 영수증과 결제내역을 이렇게 준비하세요</h2><table class="post-table"><thead><tr><th>자료</th><th>준비 방법</th></tr></thead><tbody><tr><td>선내 계정 명세서</td><td>하선 전 앱 또는 게스트서비스에서 구매 항목과 금액을 캡처</td></tr><tr><td>기항지 영수증</td><td>현지 통화, 구매일, 매장명, 품목이 보이게 보관</td></tr><tr><td>카드 승인내역</td><td>영수증 분실에 대비해 카드 앱 화면을 저장</td></tr><tr><td>면세점 주문내역</td><td>국내·외 면세점 앱의 주문번호와 결제금액을 저장</td></tr><tr><td>물품 사진</td><td>고가품과 포장 상태를 기록해 설명이 필요할 때 활용</td></tr></tbody></table><p>신고 대상 물품은 위탁 캐리어 깊숙이 넣기보다 세관 직원에게 제시할 수 있도록 위치를 기억하세요. 하선 전 수하물 배치와 태그 준비는 <a href="/blog/cruise-luggage-guide/">크루즈 수하물 가이드</a>를 참고할 수 있습니다.</p><h2 id="checklist">8. 하선 전 체크리스트</h2><div class="post-check"><ul><li>선내 면세점·기항지·국내 면세점 구매내역을 모두 합산했다.</li><li>일반물품 800달러와 주류·담배·향수 별도 범위를 구분했다.</li><li>가족별 실제 구매품과 영수증을 나눠 정리했다.</li><li>선내 계정 최종 명세서를 저장했다.</li><li>현지 통화 영수증과 카드 승인내역을 함께 보관했다.</li><li>주류의 병 수가 아니라 전체 용량과 총가격을 확인했다.</li><li>신고 여부가 애매한 고가품·선물·업무용 물품을 따로 적었다.</li><li>도착 항만의 세관 신고 안내와 모바일 이용 가능 여부를 확인했다.</li><li>여권과 입국 관련 서류를 쉽게 꺼낼 수 있게 준비했다.</li></ul></div><p>여권 유효기간과 승선·입국 서류를 함께 점검하려면 <a href="/blog/cruise-passport-documents-check/">크루즈 여권·서류 체크 가이드</a>를 확인하세요. 농축수산물, 의약품, 위조품, 멸종위기종 제품 등은 금액 면세범위와 별도로 검역·허가·반입 제한이 적용될 수 있으므로 해당 품목의 공식 규정을 추가로 확인해야 합니다.</p><div class="post-sources"><strong>공식 자료 및 확인일</strong><ul><li><a href="https://www.customs.go.kr/call/ad/crmcc/selectFaqViewPage.do?cnslKnwlSrno=411&amp;mi=6822" rel="noopener noreferrer">관세청 고객지원센터 — 여행자휴대품의 면세범위</a> · 2026년 7월 21일 확인</li><li><a href="https://www.customs.go.kr/incheon/cm/cntnts/cntntsView.do?cntntsId=5480&amp;mi=10784" rel="noopener noreferrer">인천본부세관 — 입국시 세관 신고 절차·면세범위</a> · 2026년 7월 21일 확인</li><li><a href="https://www.customs.go.kr/kcs/na/ntt/selectNttInfo.do?mi=2891&amp;nttSn=10079320&amp;nttSnUrl=search" rel="noopener noreferrer">관세청 — 신고할 물품이 없는 여행자 신고서 제출 생략·모바일 신고</a> · 2026년 7월 21일 확인</li><li><a href="https://www.customs.go.kr/gimhae/cm/cntnts/cntntsView.do?cntntsId=829&amp;mi=6516" rel="noopener noreferrer">김해공항세관 — 여행자 휴대품 신고 절차</a> · 2026년 7월 21일 확인</li></ul><p>면세범위, 세율, 모바일 신고 운영은 변경될 수 있습니다. 입국 직전 관세청 여행자 통관 안내와 도착 항만 세관의 현장 지시를 다시 확인하세요.</p></div><div class="post-tags"><span>#크루즈면세점</span><span>#세관신고</span><span>#여행자면세한도</span><span>#한국입국</span></div><section class="post-related"><h2>함께 확인할 글</h2><div class="post-related-grid"><a href="/blog/cruise-onboard-payment-guide/"><strong>크루즈 선상 결제</strong><span>승선카드·보증금·최종 명세서를 확인합니다.</span></a><a href="/blog/cruise-luggage-guide/"><strong>크루즈 수하물 정리</strong><span>하선 전 캐리어와 직접 들고 갈 가방을 나눕니다.</span></a><a href="/blog/cruise-passport-documents-check/"><strong>여권과 입국 서류</strong><span>출발 전 필요한 서류를 다시 점검합니다.</span></a></div></section><div class="post-cta"><h2>다른 준비 질문도 확인하세요</h2><p>비용·선실·준비물·기항지별 실전 정보를 크루즈플레이 콘텐츠에서 확인할 수 있습니다.</p><a href="/blog/">전체 크루즈 가이드 보기</a></div></div></article><nav class="site-policy-links" aria-label="사이트 정책"><a href="/about/">소개</a><a href="/editorial-policy/">편집정책</a><a href="/privacy/">개인정보처리방침</a><a href="/terms/">이용약관</a><a href="/contact/">문의</a></nav></main></div></body></html>'''

          new_page.parent.mkdir(parents=True, exist_ok=False)
          new_page.write_text(page_html, encoding="utf-8")

          replacement_post = {
              "slug": NEW_SLUG,
              "category": CATEGORY,
              "title": TITLE,
              "summary": SUMMARY,
              "thumbnail_url": IMAGE,
              "tag_text": TAGS,
              "published_at": TODAY,
              "updated_at": TODAY,
              "sort_order": old_post.get("sort_order"),
          }
          meta["posts"] = [replacement_post if p.get("slug") == OLD_SLUG else p for p in posts]
          meta_path.write_text(json.dumps(meta, ensure_ascii=False, separators=(",", ":")), encoding="utf-8")

          index_html = index_path.read_text(encoding="utf-8")
          new_card = (
              f'<article class="blog-card" data-category="{CATEGORY}"><a href="/blog/{NEW_SLUG}/">'
              f'<img src="{image_html}" alt="{html.escape(TITLE, quote=True)}" width="1600" height="900" loading="eager" decoding="async" fetchpriority="high">'
              f'<time>{TODAY}</time><h2>{title_html}</h2><p>{summary_html}</p></a></article>'
          )
          card_pattern = re.compile(r'<article class="blog-card"[^>]*><a href="/blog/' + re.escape(OLD_SLUG) + r'/".*?</article>', re.S)
          index_html, changed = card_pattern.subn(new_card, index_html, count=1)
          if changed != 1:
              raise SystemExit(f"정적 목록 교체 실패: {changed}")
          if '<strong id="blogResultsCount">57</strong>' not in index_html:
              raise SystemExit("정적 전체 글 수 57 표시 누락")
          index_path.write_text(index_html, encoding="utf-8")

          sitemap = sitemap_path.read_text(encoding="utf-8")
          if sitemap.count(OLD_URL) != 1 or URL in sitemap:
              raise SystemExit("사이트맵 교체 전 URL 상태 오류")
          sitemap = sitemap.replace(OLD_URL, URL, 1)
          sitemap_path.write_text(sitemap, encoding="utf-8")

          def replace_feed_item(path):
              text = path.read_text(encoding="utf-8")
              matches = list(re.finditer(r"<item>.*?</item>", text, re.S))
              if len(matches) != 20:
                  raise SystemExit(f"{path.name} 교체 전 item 수 오류: {len(matches)}")
              old_items = [m for m in matches if OLD_URL in m.group(0)]
              if len(old_items) != 1:
                  raise SystemExit(f"{path.name} 교체 대상 item 오류: {len(old_items)}")
              item = (
                  f"<item><title>{title_html}</title><link>{URL}</link>"
                  f"<guid isPermaLink=\"true\">{URL}</guid><description>{summary_html}</description>"
                  f"<category>{CATEGORY}</category><dc:creator>{AUTHOR}</dc:creator><pubDate>{RSS_DATE}</pubDate></item>"
              )
              target = old_items[0]
              text = text[:target.start()] + item + text[target.end():]
              path.write_text(text, encoding="utf-8")

          replace_feed_item(rss_path)
          replace_feed_item(feed_path)
          old_page.unlink()
          old_page.parent.rmdir()

          saved_meta = json.loads(meta_path.read_text(encoding="utf-8"))
          saved_posts = saved_meta["posts"]
          if len(saved_posts) != 57:
              raise SystemExit("교체 후 메타 글 수가 57이 아님")
          today_posts = [p for p in saved_posts if p.get("published_at") == TODAY]
          if len(today_posts) != 1 or today_posts[0].get("slug") != NEW_SLUG:
              raise SystemExit("교체 후 당일 글 1편 규칙 실패")
          if any(p.get("slug") == OLD_SLUG for p in saved_posts):
              raise SystemExit("교체 후 이전 slug가 메타에 남음")

          saved_index = index_path.read_text(encoding="utf-8")
          card_count = saved_index.count('<article class="blog-card"')
          if card_count != len(saved_posts):
              raise SystemExit(f"정적 카드와 메타 수 불일치: cards={card_count}, meta={len(saved_posts)}")
          for post in saved_posts:
              href = f'/blog/{post["slug"]}/'
              if href not in saved_index:
                  raise SystemExit("정적 목록 상세 URL 누락: " + href)
          if OLD_SLUG in saved_index or OLD_URL in saved_index:
              raise SystemExit("정적 목록에 이전 세탁 URL 잔존")
          for required_link in ("/about/", "/editorial-policy/", "/privacy/", "/terms/", "/contact/"):
              if required_link not in saved_index:
                  raise SystemExit("blog index 정책 링크 누락: " + required_link)

          js = js_path.read_text(encoding="utf-8")
          if ".blog-card" not in js or "extractItemsFromDom" not in js:
              raise SystemExit("blog-index.js가 정적 DOM 카드를 사용하지 않음")
          if re.search(r"\bfetch\s*\(", js):
              raise SystemExit("blog-index.js에서 JSON fetch 발견")

          final_page = new_page.read_text(encoding="utf-8")
          if final_page.count('<link rel="canonical"') != 1 or final_page.count('<meta name="robots"') != 1:
              raise SystemExit("신규 페이지 canonical 또는 robots 개수 오류")
          if '"@type":"BlogPosting"' not in final_page:
              raise SystemExit("BlogPosting 구조화 데이터 누락")
          if AUTHOR not in final_page or DISPLAY_DATE not in final_page:
              raise SystemExit("작성자·게시일·수정일 누락")
          for rel_slug, _ in related:
              if f'/blog/{rel_slug}/' not in final_page:
                  raise SystemExit("본문 내부링크 누락: " + rel_slug)

          sitemap_check = sitemap_path.read_text(encoding="utf-8")
          locs = re.findall(r"<loc>(.*?)</loc>", sitemap_check)
          if len(locs) != len(set(locs)):
              raise SystemExit("sitemap.xml 중복 URL")
          if locs.count(URL) != 1 or OLD_URL in sitemap_check or "/partner/" in sitemap_check:
              raise SystemExit("sitemap 신규·이전 URL 또는 partner 제외 검증 실패")

          sitemap_google = sitemap_google_path.read_text(encoding="utf-8")
          if f"{BASE}/sitemap.xml" not in sitemap_google or "/partner/" in sitemap_google:
              raise SystemExit("sitemap-google.xml 인덱스 상태 오류")
          robots = robots_path.read_text(encoding="utf-8")
          if f"Sitemap: {BASE}/sitemap.xml" not in robots or "Disallow: /partner/" not in robots:
              raise SystemExit("robots.txt sitemap 또는 partner 제외 규칙 오류")
          partner = partner_path.read_text(encoding="utf-8", errors="replace").lower()
          if 'name="robots"' not in partner or "noindex" not in partner or "nofollow" not in partner:
              raise SystemExit("partner noindex,nofollow 검증 실패")

          for syndication in (rss_path, feed_path):
              text = syndication.read_text(encoding="utf-8")
              items = re.findall(r"<item>.*?</item>", text, re.S)
              if len(items) != 20:
                  raise SystemExit(f"{syndication.name} 최신 20개 규칙 실패: {len(items)}")
              if URL not in items[0] or text.count(URL) != 2:
                  raise SystemExit(f"{syndication.name} 신규 item 위치 또는 URL 개수 오류")
              if OLD_URL in text:
                  raise SystemExit(f"{syndication.name}에 이전 URL 잔존")

          report = [
              "STATIC_VALIDATION=PASS",
              f"title={TITLE}",
              f"url={URL}",
              f"replaced_slug={OLD_SLUG}",
              f"duplicate_best_slug={best[3]}",
              f"duplicate_best_score={best[0]:.3f}",
              f"cards={card_count}",
              f"meta={len(saved_posts)}",
              "today_posts=1",
              "sitemap_new_url=1",
              "sitemap_old_url=0",
              "rss_items=20",
              "feed_items=20",
              "partner_noindex_nofollow=PASS",
              "javascript_free_static_links=PASS",
          ]
          Path("replacement-report.txt").write_text("\n".join(report) + "\n", encoding="utf-8")
          print("\n".join(report))
          PY

      - name: Commit validated replacement
        shell: bash
        run: |
          rm -f .github/workflows/replace-duplicate-cruise-guide.yml
          git config user.name "cruiseplay-content-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content/blog-meta.json blog/index.html blog/cruise-duty-free-customs-declaration-korea-guide/index.html blog/cruise-laundry-self-service-cost-guide/index.html sitemap.xml rss.xml feed.xml .github/workflows/replace-duplicate-cruise-guide.yml
          git diff --cached --check
          git commit -m "Replace duplicate laundry guide with cruise customs guide"
          git push origin HEAD:main

      - name: Verify deployed URLs
        shell: bash
        run: |
          set -euo pipefail
          new_url="https://cruiseplay-dyt.pages.dev/blog/cruise-duty-free-customs-declaration-korea-guide/"
          old_url="https://cruiseplay-dyt.pages.dev/blog/cruise-laundry-self-service-cost-guide/"
          ready=0
          for attempt in $(seq 1 18); do
            code=$(curl -L -sS -o /tmp/new-page.html -w "%{http_code}" --connect-timeout 15 --max-time 30 "$new_url" || true)
            if [ "$code" = "200" ] && grep -Fq "크루즈 면세품은 한국 입국 때 어떻게 신고할까?" /tmp/new-page.html; then
              ready=1
              echo "200 $new_url" | tee -a replacement-report.txt
              break
            fi
            echo "deploy_attempt=$attempt status=$code" | tee -a replacement-report.txt
            sleep 10
          done
          test "$ready" = "1"

          for url in \
            "https://cruiseplay-dyt.pages.dev/blog/cruise-onboard-payment-guide/" \
            "https://cruiseplay-dyt.pages.dev/blog/cruise-luggage-guide/" \
            "https://cruiseplay-dyt.pages.dev/blog/cruise-passport-documents-check/"; do
            code=$(curl -L -sS -o /dev/null -w "%{http_code}" --connect-timeout 15 --max-time 30 "$url")
            test "$code" = "200"
            echo "200 $url" | tee -a replacement-report.txt
          done

          old_code=$(curl -L -sS -o /dev/null -w "%{http_code}" --connect-timeout 15 --max-time 30 "$old_url" || true)
          test "$old_code" != "200"
          echo "old_url_status=$old_code" | tee -a replacement-report.txt

          curl -L -sS "https://cruiseplay-dyt.pages.dev/blog/" -o /tmp/blog-index.html
          test "$(grep -Fo '/blog/cruise-duty-free-customs-declaration-korea-guide/' /tmp/blog-index.html | wc -l)" -ge 1
          test "$(grep -Fo '/blog/cruise-laundry-self-service-cost-guide/' /tmp/blog-index.html | wc -l)" = "0"
          curl -L -sS "https://cruiseplay-dyt.pages.dev/sitemap.xml" -o /tmp/sitemap.xml
          test "$(grep -Fo "$new_url" /tmp/sitemap.xml | wc -l)" = "1"
          test "$(grep -Fo "$old_url" /tmp/sitemap.xml | wc -l)" = "0"
          curl -L -sS "https://cruiseplay-dyt.pages.dev/rss.xml" -o /tmp/rss.xml
          grep -Fq "$new_url" /tmp/rss.xml
          ! grep -Fq "$old_url" /tmp/rss.xml
          echo "LIVE_VALIDATION=PASS" | tee -a replacement-report.txt

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cruise-customs-replacement-${{ github.run_number }}
          path: replacement-report.txt
          retention-days: 1
