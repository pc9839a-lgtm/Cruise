name: Trigger cruise publisher

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.title == 'Run cruise content publisher'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          show-progress: false

      - name: Execute embedded publisher
        id: publisher
        shell: bash
        run: |
          set +e
          python - <<'PY' > publisher.log 2>&1
          from pathlib import Path
          source = Path('.github/workflows/publish-one-cruise-guide.yml').read_text(encoding='utf-8')
          lines = source.splitlines()
          start = next(i for i, line in enumerate(lines) if line.strip() == "python - <<'PY'") + 1
          end = next(i for i in range(start, len(lines)) if lines[i].strip() == 'PY')
          code_lines = lines[start:end]
          indent = min((len(line) - len(line.lstrip()) for line in code_lines if line.strip()), default=0)
          code = '\n'.join(line[indent:] if line.strip() else '' for line in code_lines)
          exec(compile(code, 'embedded-publisher.py', 'exec'))
          PY
          status=$?
          echo "publisher_status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Show publisher result
        shell: bash
        run: |
          cat publisher.log
          test "${{ steps.publisher.outputs.publisher_status }}" = "0"

      - name: Commit validated content
        if: steps.publisher.outputs.publisher_status == '0'
        shell: bash
        run: |
          rm -f .github/workflows/publish-one-cruise-guide.yml .github/workflows/trigger-publisher.yml
          git config user.name "cruiseplay-content-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content/blog-meta.json blog/index.html blog/cruise-laundry-self-service-cost-guide/index.html sitemap.xml rss.xml feed.xml .github/workflows/publish-one-cruise-guide.yml .github/workflows/trigger-publisher.yml
          git diff --cached --check
          git commit -m "Publish cruise laundry service guide"
          git push origin HEAD:main
