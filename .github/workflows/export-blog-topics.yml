name: Export cruise blog topics

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  audit:
    if: github.event.pull_request.title == 'Audit cruise blog topics'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          show-progress: false
      - name: Export titles and slugs
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data=json.loads(Path('content/blog-meta.json').read_text(encoding='utf-8'))
          posts=data['posts']
          with Path('blog-topics.txt').open('w',encoding='utf-8') as f:
              for i,p in enumerate(posts,1):
                  f.write(f"{i:02d}\t{p.get('published_at','')}\t{p.get('slug','')}\t{p.get('title','')}\t{p.get('summary','')}\n")
          print(f"topics={len(posts)}")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: cruise-blog-topics-${{ github.run_number }}
          path: blog-topics.txt
          retention-days: 1
      - name: Remove one-time topic audit
        shell: bash
        run: |
          rm -f .github/workflows/export-blog-topics.yml
          git config user.name "cruiseplay-content-bot"
          git config user.email "actions@users.noreply.github.com"
          git add .github/workflows/export-blog-topics.yml
          git commit -m "Remove one-time blog topic audit"
          git push origin HEAD:main
